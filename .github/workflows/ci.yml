name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Reconcile control totals against baseline
        run: npm run reconcile
      - name: Logic tests (analytics / budget / io)
        run: npm test
      - name: Component smoke test (render every page in jsdom)
        run: npm run smoke
      - name: Build static export
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
